symbol: BTC/USDT

portfolio:
  usdt: 231.26806423
  btc: 0.00128645
  target_btc_min_pct: 50
  target_btc_max_pct: 75
  max_single_buy_usdt: 60
  emergency_usdt_reserve: 150

mental:
  state: calm
  max_alerts_per_day: 8

risk:
  pump_24h_pct: 4
  dump_24h_pct: -5
  dip_from_7d_high_pct: -8
  deep_dip_from_7d_high_pct: -15
  near_7d_low_pct: 2
  confirmation_above_ma_pct: 1.5

alert_policy:
  send_every_run: true
  send_on_signal_change: true
  send_on_action: true
  heartbeat_hours:
    - 0
    - 12
  significant_price_change_pct: 3

strategy:
  allow_confirmation_buy: true
  allow_dip_buy: true
  no_trade_when_panic: true

github_repo_health:
  remind_after_days: 55
  critical_after_days: 57

data_sources:
  use_tokocrypto_public_price: false
  use_tokocrypto_private_balance: false
  use_tokocrypto_open_orders: false
  fallback_to_coingecko: true

manual_open_orders:
  enabled: true
  orders:
    - side: buy
      type: limit
      price: 58000
      amount: 0.00051
      allocated_usdt: 29.58
      status: open

    - side: buy
      type: limit
      price: 60000
      amount: 0.00050
      allocated_usdt: 30.00
      status: open

    - side: buy
      type: limit
      price: 62561
      amount: 0.00023
      allocated_usdt: 14.38903
      status: open

manual_executions:
  enabled: true

  anti_repeat:
    enabled: true

    # Minimum time after manual buy before the same signal may be considered again.
    cooldown_hours: 72

    # Block repeated buy from the same signal key, e.g. BUY_SMALL_CONFIRMATION_WITH_LADDER.
    block_same_signal_key: true

    # Block repeated buy from the same tier, e.g. early_confirmation.
    block_same_tier: true

    # Same-tier buy is allowed again only if price moves enough from last buy.
    # For a buy, this mainly means a meaningful pullback from last buy price.
    require_price_move_pct_for_same_tier_buy: 2.0

    # Allow new buy if signal tier upgrades from early_confirmation to confirmed_breakout.
    allow_new_buy_if_tier_upgrades: true

    # --- Cooldown bypass conditions (set 0 to disable) ---
    # Bypass cooldown if price rose significantly from last buy (breakout nyata).
    bypass_if_price_rise_from_last_buy_pct: 5

    # Bypass cooldown if price dropped significantly from last buy (diskon nyata).
    bypass_if_price_drop_from_last_buy_pct: 10

    # If true, manual execution history can block repeat buy before Gemini sees candidates.
    block_before_gemini: true

  entries:
    - id: "2026-06-13-buy-63700-001"
      status: filled
      side: buy
      order_type: limit

      source_signal_key: "BUY_SMALL_CONFIRMATION_WITH_LADDER"
      source_tier: "early_confirmation"

      limit_price_usdt: 63700
      avg_fill_price_usdt: 63838.01
      quote_spent_usdt: 14.68274230
      base_received_btc: 0.00022912
      fee_btc: 0

      placed_at_utc: "2026-06-13T00:00:00Z"
      executed_at_utc: "2026-06-13T00:00:00Z"
      related_open_order_price: null
      note: "Executed Gemini early-confirmation buy signal manually"

intrahour_price_check:
  enabled: true
  source: "coingecko_market_chart"
  lookback_minutes: 90
  touch_tolerance_pct: 0.15
  force_verify_on_touch: true
  estimate_portfolio_if_touched: true

gemini_decision:
  enabled: true

  # Gemini can affect final decision, but only through deterministic risk guards.
  affect_final_decision: true

  allowed_to_recommend_buy: true
  allow_buy_with_open_orders: true

  min_confidence_to_buy: 80
  min_confidence_to_sell: 80

  min_usdt_free_after_buy: 150
  require_btc_below_target_min: true

  block_buy_if_possible_fill_detected: true
  block_buy_if_panic_or_dump: true

  bullish_confirmation:
    require_price_above_ma7: true
    require_price_above_ma20: false
    confirmation_above_ma20_pct: 1.5
    allow_if_price_above_ma7_but_below_ma20: true

  exposure_policy:
    enabled: true

    early_confirmation:
      description: "BTC above MA7 but still below confirmed MA20 breakout"
      max_buy_usdt_with_open_orders: 15
      max_buy_usdt_without_open_orders: 25
      max_upside_btc_pct_after_buy: 35
      max_downside_planned_btc_pct: 55
      min_confidence_to_buy: 85

    confirmed_breakout:
      description: "BTC above MA20 with confirmation"
      max_buy_usdt_with_open_orders: 25
      max_buy_usdt_without_open_orders: 40
      max_upside_btc_pct_after_buy: 45
      max_downside_planned_btc_pct: 60
      min_confidence_to_buy: 80

    overheated:
      description: "BTC pumping too fast; block fresh buy"
      block_buy_if_24h_pump_above_pct: 4
      max_buy_usdt_with_open_orders: 0
      max_buy_usdt_without_open_orders: 0

btc_cost_basis:
  enabled: true
  method: "manual_lots"

  # Bot hanya akan mengaktifkan take-profit sell kalau manual lots
  # mencakup minimal 90% dari BTC yang ada di portfolio config.
  min_coverage_pct: 90

  manual_lots:
    - side: buy
      amount_btc: 0.00065733
      price_usdt: 81000
      fee_btc: 0
      note: "Initial BTC entry around 5 May 2026"

    - side: buy
      amount_btc: 0.00040
      price_usdt: 61000
      fee_btc: 0
      note: "Filled buy limit at 61000"

    - side: buy
      amount_btc: 0.00022912
      price_usdt: 63838.01
      fee_btc: 0
      note: "Gemini early-confirmation manual buy around 63700"

sell_strategy:
  enabled: true

  allow_take_profit_sell: true
  allow_rebalance_sell: true

  # Keep false for now. Do not panic-sell underallocated BTC.
  allow_risk_reduction_sell: false

  max_single_sell_btc_pct_of_holdings: 25
  min_btc_pct_after_sell: 50

  take_profit:
    enabled: true
    min_profit_pct_from_avg_entry: 8
    sell_pct_of_holdings: 20

  rebalance:
    enabled: true
    sell_if_btc_pct_above: 75
    target_btc_pct_after_sell: 65

  risk_reduction:
    enabled: false
    sell_if_price_below_ma20_pct: 3
    sell_pct_of_holdings: 15

manual_execution:
  buy_order_type_preference: "limit"
  limit_buy_offset_pct: 0.15
  allow_market_buy_for_small_size: true
  market_buy_max_usdt: 15
  max_acceptable_market_spread_pct: 0.10
  limit_expiry_guidance_minutes: 15

adaptive_pullback_limit:
  enabled: true

  # Candidate action key that Gemini may choose.
  action_key: "PLACE_PULLBACK_LIMIT_BUY"

  # Manual-only. Bot only recommends a limit order; it never places it.
  manual_only: true

  # Only one adaptive pullback order should exist at a time.
  block_if_active_pullback_order_exists: true
  max_active_pullback_orders: 1

  # Allow this candidate even when existing 58k/60k ladder orders are active,
  # but still count everything into planned exposure.
  allow_with_open_orders: true

  # Order size. Keep small because this is adaptive exposure, not a new big ladder.
  max_order_usdt_with_open_orders: 15
  max_order_usdt_without_open_orders: 20

  # For recent manual buy anti-repeat:
  # Pullback limit may still be allowed, but only if the suggested limit price
  # is meaningfully below the last filled manual buy.
  require_limit_below_last_manual_buy_pct: 2.0

  # Limit price offset from current market price by tier.
  # Example: BTC 64,000 and early_confirmation offset 1.25% => limit around 63,200.
  limit_offset_pct_from_current:
    early_confirmation: 1.25
    confirmed_breakout: 1.75

  min_limit_offset_pct_from_current: 0.75
  max_limit_offset_pct_from_current: 3.00

  # Keep pullback limit above the old deep ladder by a reasonable gap,
  # so it is an adaptive pullback entry, not a duplicate of 58k/60k.
  min_gap_above_highest_open_buy_pct: 2.0

  # Reserve and exposure guards.
  min_usdt_free_after_order: 150
  max_upside_btc_pct_after_fill: 35
  max_downside_planned_btc_pct_after_fill: 55
  min_confidence_to_place: 85

  # Telegram guidance only.
  expiry_guidance_hours: 24

safety:
  allow_trading: false
  allow_withdrawal: false
  allow_order_cancel: false

llm:
  enabled: true
  temperature: 0.2

  quota_guard:
    enabled: true
    state_file: "data/llm_usage_state.json"
    reserve_requests_per_model: 0
    rate_limit_cooldown_minutes: 15

  hourly_deep:
    enabled: true

  models:
    deep_primary:
      model: "gemini-3.5-flash"
      max_output_tokens: 2800
      daily_limit: 20

    deep_secondary:
      model: "gemini-2.5-flash"
      max_output_tokens: 3000
      daily_limit: 20

    grounding:
      model: "gemini-2.5-flash"
      max_output_tokens: 10000
      daily_limit: 20

    fallback:
      model: "gemini-2.5-flash-lite"
      max_output_tokens: 1500
      daily_limit: 20

  fallback_models:
    - model: "gemini-2.5-flash"
      max_output_tokens: 2200
      daily_limit: 20

    - model: "gemini-2.5-flash-lite"
      max_output_tokens: 1500
      daily_limit: 20

  grounding:
    enabled: true
    use_google_search: true
    interval_hours: 1
    max_grounded_runs_per_day: 60
    use_on_interval: true
    use_on_high_volatility: true
    use_on_action_signal: true

  deep_review:
    enabled: true
    high_volatility_24h_abs_pct: 4
    use_pro_on_high_volatility: true
    use_pro_on_action_signal: true
    use_pro_on_recovery_risk: true
    recovery_gap_pct_threshold: 10

recovery:
  initial_capital_usdt: 380
  target_months: 3
  target_mode: break_even_first
