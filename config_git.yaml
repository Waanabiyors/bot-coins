symbol: BTCUSDT

portfolio:
  usdt: 270.35080653
  btc: 0.00065886
  target_btc_min_pct: 50
  target_btc_max_pct: 75
  max_single_buy_usdt: 60
  emergency_usdt_reserve: 150

mental:
  state: calm
  max_alerts_per_day: 8

risk:
  pump_24h_pct: 4
  dump_24h_pct: -5
  dip_from_7d_high_pct: -8
  deep_dip_from_7d_high_pct: -15
  near_7d_low_pct: 2
  confirmation_above_ma_pct: 1.5

alert_policy:
  send_every_run: true
  send_on_signal_change: true
  send_on_action: true
  heartbeat_hours:
    - 0
    - 12
  significant_price_change_pct: 3

strategy:
  allow_confirmation_buy: true
  allow_dip_buy: true
  no_trade_when_panic: true

github_repo_health:
  remind_after_days: 55
  critical_after_days: 57

data_sources:
  use_tokocrypto_public_price: false
  use_tokocrypto_private_balance: false
  use_tokocrypto_open_orders: false
  fallback_to_coingecko: true

manual_open_orders:
  enabled: true
  orders:
    - side: buy
      type: limit
      price: 58000
      amount: 0.00051
      allocated_usdt: 29.58
      status: open

    - side: buy
      type: limit
      price: 61000
      amount: 0.00040
      allocated_usdt: 24.40
      status: open

    - side: buy
      type: limit
      price: 60000
      amount: 0.00050
      allocated_usdt: 30.00
      status: open

safety:
  allow_trading: false
  allow_withdrawal: false
  allow_order_cancel: false

llm:
  enabled: true
  provider: gemini
  output_language: english

  default_model: gemini-3.5-flash
  deep_model: gemini-3.5-flash
  fallback_model: gemini-3.5-flash
  grounding_model: gemini-2.5-flash

  max_output_tokens: 2000
  deep_max_output_tokens: 2000
  fallback_max_output_tokens: 2000
  grounding_max_output_tokens: 2000

  temperature: 0.2
  fallback_to_rule_message: true

  deep_review:
    enabled: true
    use_pro_on_high_volatility: true
    use_pro_on_action_signal: true
    use_pro_on_recovery_risk: true
    high_volatility_24h_abs_pct: 4
    recovery_gap_pct_threshold: 10

  grounding:
    enabled: true
    use_google_search: true
    use_on_high_volatility: true
    use_on_daily_review: true
    use_on_action_signal: false
    daily_review_utc_hours:
      - 0
      - 12
    max_grounded_runs_per_day: 6

recovery:
  initial_capital_usdt: 380
  target_months: 3
  target_mode: break_even_first
