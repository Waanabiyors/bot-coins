# GLOBAL SETTINGS (Applied to all assets above unless overridden)
portfolio:
  usdt: 21.79465703
  max_single_buy_usdt: 10
  emergency_usdt_reserve: 5

mental:
  state: aggressive profit
  max_alerts_per_day: 8

risk:
  pump_24h_pct: 5
  dump_24h_pct: -5
  dip_from_7d_high_pct: -8
  deep_dip_from_7d_high_pct: -15
  near_7d_low_pct: 2
  confirmation_above_ma_pct: 1.5

alert_policy:
  send_every_run: true
  send_on_signal_change: true
  send_on_action: true
  heartbeat_hours:
    - 0
    - 12
  significant_price_change_pct: 3

strategy:
  allow_confirmation_buy: true
  allow_dip_buy: true
  no_trade_when_panic: true

github_repo_health:
  remind_after_days: 55
  critical_after_days: 57

data_sources:
  use_tokocrypto_public_price: true
  use_tokocrypto_private_balance: false
  use_tokocrypto_open_orders: false
  fallback_to_coingecko: true

manual_open_orders:
  enabled: false
  orders: []

manual_executions:
  enabled: true
  anti_repeat:
    enabled: true
    cooldown_hours: 72
    block_same_signal_key: true
    block_same_tier: true
    require_price_move_pct_for_same_tier_buy: 2.0
    allow_new_buy_if_tier_upgrades: true
    bypass_if_price_rise_from_last_buy_pct: 5
    bypass_if_price_drop_from_last_buy_pct: 10
    block_before_gemini: true
  entries: []

intrahour_price_check:
  enabled: true
  source: "binance_vision_klines"
  lookback_minutes: 90
  touch_tolerance_pct: 0.15
  force_verify_on_touch: true
  estimate_portfolio_if_touched: true

gemini_decision:
  enabled: true
  affect_final_decision: true
  allowed_to_recommend_buy: true
  allow_buy_with_open_orders: true
  min_confidence_to_buy: 80
  min_confidence_to_sell: 80
  min_usdt_free_after_buy: 5
  require_base_below_target_min: true
  block_buy_if_possible_fill_detected: true
  block_buy_if_panic_or_dump: true
  bullish_confirmation:
    require_price_above_ma7: true
    require_price_above_ma20: false
    confirmation_above_ma20_pct: 1.5
    allow_if_price_above_ma7_but_below_ma20: true
  exposure_policy:
    enabled: true
    early_confirmation:
      description: "Asset above MA7 but still below confirmed MA20 breakout"
      max_buy_usdt_with_open_orders: 5
      max_buy_usdt_without_open_orders: 10
      max_upside_base_pct_after_buy: 35
      max_downside_planned_base_pct: 55
      min_confidence_to_buy: 85
    confirmed_breakout:
      description: "Asset above MA20 with confirmation"
      max_buy_usdt_with_open_orders: 8
      max_buy_usdt_without_open_orders: 15
      max_upside_base_pct_after_buy: 45
      max_downside_planned_base_pct: 60
      min_confidence_to_buy: 80
    overheated:
      description: "Asset pumping too fast; block fresh buy"
      block_buy_if_24h_pump_above_pct: 6
      max_buy_usdt_with_open_orders: 0
      max_buy_usdt_without_open_orders: 0

sell_strategy:
  enabled: true
  allow_take_profit_sell: true
  allow_rebalance_sell: true
  allow_risk_reduction_sell: false
  max_single_sell_base_pct_of_holdings: 50
  min_base_pct_after_sell: 10
  take_profit:
    enabled: true
    min_profit_pct_from_avg_entry: 10
    sell_pct_of_holdings: 30
  rebalance:
    enabled: true
    sell_if_base_pct_above: 75
    target_base_pct_after_sell: 25
  risk_reduction:
    enabled: false

manual_execution:
  buy_order_type_preference: "limit"
  limit_buy_offset_pct: 0.15
  allow_market_buy_for_small_size: true
  market_buy_max_usdt: 10
  max_acceptable_market_spread_pct: 0.10
  limit_expiry_guidance_minutes: 15

adaptive_pullback_limit:
  enabled: true
  action_key: "PLACE_PULLBACK_LIMIT_BUY"
  manual_only: true
  block_if_active_pullback_order_exists: true
  max_active_pullback_orders: 1
  allow_with_open_orders: true
  max_order_usdt_with_open_orders: 5
  max_order_usdt_without_open_orders: 10
  require_limit_below_last_manual_buy_pct: 2.0
  limit_offset_pct_from_current:
    early_confirmation: 1.25
    confirmed_breakout: 1.75
  min_limit_offset_pct_from_current: 0.75
  max_limit_offset_pct_from_current: 4.00
  min_gap_above_highest_open_buy_pct: 2.0
  min_usdt_free_after_order: 5
  max_upside_base_pct_after_fill: 35
  max_downside_planned_base_pct_after_fill: 55
  min_confidence_to_place: 85
  expiry_guidance_hours: 24

safety:
  allow_trading: false
  allow_withdrawal: false
  allow_order_cancel: false

llm:
  enabled: true
  temperature: 0.2
  quota_guard:
    enabled: false
  hourly_deep:
    enabled: true
  models:
    deep_primary:
      model: "gemini-3.5-flash"
      max_output_tokens: 18000
      daily_limit: 20
    deep_secondary:
      model: "gemini-2.5-flash"
      max_output_tokens: 13000
      daily_limit: 20
    grounding:
      model: "gemini-2.5-flash"
      max_output_tokens: 15000
      daily_limit: 20
    fallback:
      model: "gemini-2.5-flash-lite"
      max_output_tokens: 15000
      daily_limit: 20
  fallback_models:
    - model: "gemini-2.5-flash"
      max_output_tokens: 15000
      daily_limit: 20
  grounding:
    enabled: true
    use_google_search: true
    interval_hours: 4
    max_grounded_runs_per_day: 6
    use_on_interval: true
    use_on_high_volatility: true
    use_on_action_signal: true
  deep_review:
    enabled: true
    high_volatility_24h_abs_pct: 5
    use_pro_on_high_volatility: true
    use_pro_on_action_signal: true
    use_pro_on_recovery_risk: true
    recovery_gap_pct_threshold: 10

recovery:
  initial_capital_usdt: 48
  target_months: 3
  target_mode: profit_first
