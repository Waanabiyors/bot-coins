name: BTC Discipline Agent

on:
  push:
    paths-ignore:
      - "data/llm_usage_state.json"
  workflow_dispatch:

concurrency:
  group: btc-discipline-agent
  cancel-in-progress: false

jobs:
  run-btc-agent:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Test Binance connectivity
        continue-on-error: true
        run: |
          echo "Testing Binance API..."
          curl -m 12 -sS "https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT" | head -c 500
          echo ""

      - name: Test CoinGecko connectivity
        run: |
          echo "Testing CoinGecko API..."
          curl -m 12 -sS "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd&include_24hr_change=true"
          echo ""

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run BTC Discipline Agent
        env:
          BTC_AGENT_CONFIG: config_git.yaml
          PYTHONUNBUFFERED: "1"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          #TOKOCRYPTO_API_KEY: ${{ secrets.TOKOCRYPTO_API_KEY }}
          #TOKOCRYPTO_API_SECRET: ${{ secrets.TOKOCRYPTO_API_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python main.py

      - name: Commit LLM usage state
        if: always()
        run: |
          if [ ! -f data/llm_usage_state.json ]; then
            echo "No LLM usage state file found. Nothing to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -f data/llm_usage_state.json

          if git diff --cached --quiet; then
            echo "No LLM usage state changes to commit."
          else
            git commit -m "chore: update llm usage state [skip ci]"
            git push
          fi